name: CI/CD

on:
  push:
    tags:
      - '*'
    branches:
      - '*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build documentation inside the official AsciiDoctor Docker image
  # ---------------------------------------------------------------------------
  docs:
    runs-on: ubuntu-latest
    container:
      image: asciidoctor/docker-asciidoctor:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install rsvg-convert
        run: apk add --no-cache rsvg-convert

      - name: Extract version
        id: ver
        run: echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Build HTML
        run: make html VERSION=${{ steps.ver.outputs.version }}

      - name: Build PDF
        run: make pdf VERSION=${{ steps.ver.outputs.version }}

      - name: Package HTML
        run: |
          apk add --no-cache zip
          cd build
          zip -r ../ues-docs-html-${{ steps.ver.outputs.version }}.zip .

      - name: Upload docs artefacts
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: |
            ues-docs-html-${{ steps.ver.outputs.version }}.zip
            build/spec/technical-spec.pdf
            build/docs/idea-and-business.pdf

  # ---------------------------------------------------------------------------
  # Job 2: Export CAD (STEP / STL)
  # ---------------------------------------------------------------------------
  # Job 2: Create GitHub Release with all artefacts
  # ---------------------------------------------------------------------------
  release:
    runs-on: ubuntu-latest
    needs: [docs]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Extract version
        id: ver
        run: echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Download docs
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: artefacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "UES ${{ steps.ver.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Universal Eyeglass Standard ${{ steps.ver.outputs.version }}

            ### Release artefacts

            | File | Description |
            |------|-------------|
            | `ues-docs-html-*.zip` | Full HTML documentation (open `index.html`) |
            | `technical-spec.pdf` | Technical Specification |
            | `idea-and-business.pdf` | Idea & Business Model |

            ### Sizes
            | Code | Diameter | Bridge |
            |------|----------|---------|
            | UES-C-XS | 51 mm | 15 mm |
            | UES-C-S  | 56 mm | 17 mm |
            | UES-C-M  | 61 mm | 19 mm |
            | UES-C-L  | 67 mm | 21 mm |
          files: |
            artefacts/ues-docs-html-${{ steps.ver.outputs.version }}.zip
            artefacts/build/spec/technical-spec.pdf
            artefacts/build/docs/idea-and-business.pdf
