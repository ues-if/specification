name: Spec CI/CD

on:
  push:
    tags:
      - '*'
    branches:
      - '*'

permissions:
  contents: write

jobs:
  spec:
    runs-on: ubuntu-latest
    container:
      image: asciidoctor/docker-asciidoctor:latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Build HTML
        run: make html VERSION=${{ steps.ver.outputs.version }}

      - name: Build PDF
        run: make pdf VERSION=${{ steps.ver.outputs.version }}

      - name: Package spec HTML
        run: |
          apk add --no-cache zip
          cd build/spec
          zip -r ../../ues-spec-html-${{ steps.ver.outputs.version }}.zip .

      - name: Upload spec artefacts
        uses: actions/upload-artifact@v4
        with:
          name: spec
          path: |
            ues-spec-html-${{ steps.ver.outputs.version }}.zip
            build/spec/technical-spec.pdf
            build/spec/compliance-test.pdf

  release:
    runs-on: ubuntu-latest
    needs: [spec]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Extract version
        id: ver
        run: echo "version=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"

      - name: Download spec artefacts
        uses: actions/download-artifact@v4
        with:
          name: spec
          path: artefacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "UES ${{ steps.ver.outputs.version }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Universal Eyeglass Standard ${{ steps.ver.outputs.version }}

            ### Release artefacts

            | File | Description |
            |------|-------------|
            | `ues-spec-html-*.zip` | HTML bundle for the technical specification and compliance test |
            | `technical-spec.pdf` | Technical Specification |
            | `compliance-test.pdf` | Compliance Test Procedures |

            ### Sizes
            | Code | Diameter | Bridge |
            |------|----------|---------|
            | UES-C-XS | 51 mm | 15 mm |
            | UES-C-S  | 56 mm | 17 mm |
            | UES-C-M  | 61 mm | 19 mm |
            | UES-C-L  | 67 mm | 21 mm |
          files: |
            artefacts/ues-spec-html-${{ steps.ver.outputs.version }}.zip
            artefacts/build/spec/technical-spec.pdf
            artefacts/build/spec/compliance-test.pdf
