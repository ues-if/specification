<?xml version="1.0" encoding="UTF-8"?>
<!--
  UES – Universal Eyeglass Socket
  Compact certification mark (no text, no temples)

  Intended use:
    • Embossed or laser-engraved on frame temples
    • Printed on lens packaging
    • Inline badge in documentation

  At real-world scale the mark occupies ≈ 14 mm × 10 mm.
  Canvas: 130 × 62 px  (≈ 2.1 : 1 ratio)

  Left lens  : centre (30, 31)   right edge x = 55
  Right lens : centre (100, 31)  left  edge x = 75
  Bridge gap : 20 px  (proportional to C-M bridge / lens-diameter ratio)
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 130 62"
     width="130" height="62"
     role="img"
     aria-label="UES certification mark">

  <title>UES — Certification Mark</title>
  <desc>
    Compact single-colour mark for the Universal Eyeglass Socket.
    Stamp or engrave on any UES-compliant frame or lens packaging.
  </desc>

  <!-- ── Left lens: outer rim ── -->
  <circle cx="30" cy="31" r="25"
          fill="none" stroke="#1a1a2e" stroke-width="5"/>

  <!-- ── Left lens: inner ring (bevel-seat indicator) ── -->
  <circle cx="30" cy="31" r="17"
          fill="none" stroke="#1a1a2e" stroke-width="2"/>

  <!-- ── Right lens: outer rim ── -->
  <circle cx="100" cy="31" r="25"
          fill="none" stroke="#1a1a2e" stroke-width="5"/>

  <!-- ── Right lens: inner ring ── -->
  <circle cx="100" cy="31" r="17"
          fill="none" stroke="#1a1a2e" stroke-width="2"/>

  <!-- ── Bridge arch ── -->
  <!--   Start (55,31) → peak (~65,17) → end (75,31)  -->
  <path d="M 55,31 C 60,17 70,17 75,31"
        fill="none" stroke="#1a1a2e" stroke-width="5" stroke-linecap="round"/>

</svg>
